<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 533" width="1600" height="533">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e2e"/>
      <stop offset="60%" stop-color="#1a1060"/>
      <stop offset="100%" stop-color="#2d1b6e"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="aurora3" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1060"/>
      <stop offset="100%" stop-color="#0f0830"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0830"/>
      <stop offset="100%" stop-color="#060418"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="25%" r="35%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="533" fill="url(#sky)"/>

  <!-- Glow halos -->
  <ellipse cx="480" cy="180" rx="420" ry="180" fill="url(#glow1)"/>
  <ellipse cx="1200" cy="130" rx="360" ry="150" fill="url(#glow2)"/>

  <!-- Aurora bands -->
  <path d="M0,80 Q200,20 500,90 Q800,160 1100,70 Q1350,10 1600,80 L1600,0 L0,0 Z"
        fill="url(#aurora1)" filter="url(#blur1)" opacity="0.8"/>
  <path d="M0,140 Q300,60 650,130 Q1000,200 1300,110 Q1480,60 1600,130 L1600,0 L0,0 Z"
        fill="url(#aurora2)" filter="url(#blur1)" opacity="0.7"/>
  <path d="M0,200 Q250,120 550,180 Q850,240 1150,160 Q1400,100 1600,170 L1600,0 L0,0 Z"
        fill="url(#aurora3)" filter="url(#blur2)" opacity="0.6"/>

  <!-- Stars (scattered) -->
  <g fill="white" opacity="0.7">
    <circle cx="45"  cy="22"  r="1.2"/>
    <circle cx="120" cy="48"  r="0.9"/>
    <circle cx="210" cy="15"  r="1.4"/>
    <circle cx="310" cy="38"  r="0.8"/>
    <circle cx="380" cy="10"  r="1.1"/>
    <circle cx="480" cy="55"  r="0.7"/>
    <circle cx="560" cy="18"  r="1.3"/>
    <circle cx="640" cy="44"  r="0.9"/>
    <circle cx="730" cy="8"   r="1.5"/>
    <circle cx="820" cy="32"  r="0.8"/>
    <circle cx="890" cy="20"  r="1.0"/>
    <circle cx="980" cy="50"  r="0.7"/>
    <circle cx="1060" cy="12" r="1.2"/>
    <circle cx="1140" cy="40" r="0.9"/>
    <circle cx="1220" cy="24" r="1.4"/>
    <circle cx="1310" cy="55" r="0.8"/>
    <circle cx="1400" cy="16" r="1.1"/>
    <circle cx="1490" cy="36" r="0.9"/>
    <circle cx="1560" cy="8"  r="1.3"/>
    <circle cx="88"   cy="70" r="0.7"/>
    <circle cx="170"  cy="90" r="1.0"/>
    <circle cx="260"  cy="62" r="0.8"/>
    <circle cx="440"  cy="80" r="1.1"/>
    <circle cx="620"  cy="72" r="0.7"/>
    <circle cx="760"  cy="88" r="0.9"/>
    <circle cx="940"  cy="65" r="1.2"/>
    <circle cx="1100" cy="78" r="0.8"/>
    <circle cx="1280" cy="92" r="1.0"/>
    <circle cx="1460" cy="68" r="0.7"/>
  </g>

  <!-- Distant mountains (far, hazy) -->
  <path d="M0,350 Q80,250 180,290 Q260,240 360,270 Q440,210 560,255 Q660,200 760,240
           Q860,195 960,235 Q1060,185 1160,225 Q1260,190 1360,220 Q1460,200 1600,240 L1600,533 L0,533 Z"
        fill="#160c40" opacity="0.6"/>

  <!-- Mid mountains -->
  <path d="M0,390 Q60,310 150,340 Q230,280 320,315 Q400,265 510,295 Q590,250 700,285
           Q800,240 900,275 Q1000,230 1100,268 Q1200,240 1300,260 Q1400,230 1500,255 Q1560,240 1600,255
           L1600,533 L0,533 Z"
        fill="url(#mtn)"/>

  <!-- Near mountains -->
  <path d="M0,430 Q50,370 130,395 Q190,355 280,378 Q350,340 450,365 Q530,328 620,355
           Q700,320 800,350 Q880,315 970,342 Q1050,308 1150,335 Q1240,305 1340,328 Q1430,300 1530,325 L1600,315
           L1600,533 L0,533 Z"
        fill="#100838"/>

  <!-- Ground / foreground -->
  <path d="M0,480 Q200,460 400,475 Q600,490 800,468 Q1000,448 1200,470 Q1400,488 1600,462 L1600,533 L0,533 Z"
        fill="url(#ground)"/>

  <!-- Reflection on ground (faint aurora glow) -->
  <ellipse cx="480"  cy="500" rx="300" ry="25" fill="#22d3ee" opacity="0.05"/>
  <ellipse cx="1200" cy="510" rx="280" ry="20" fill="#a78bfa" opacity="0.05"/>
</svg>
